<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design retune — current vs ElevenLabs-inspired</title>
    <style>
      @font-face {
        font-family: "Apfel Grotezk"; font-weight: 400; font-display: swap;
        src: url(/fonts/apfel-grotezk/ApfelGrotezk-Regular.woff2) format("woff2");
      }
      @font-face {
        font-family: "Apfel Grotezk"; font-weight: 500; font-display: swap;
        src: url(/fonts/apfel-grotezk/ApfelGrotezk-Mittel.woff2) format("woff2");
      }
      @font-face {
        font-family: "Apfel Grotezk"; font-weight: 600; font-display: swap;
        src: url(/fonts/apfel-grotezk/ApfelGrotezk-Satt.woff2) format("woff2");
      }

      /* ---- CURRENT tokens (verbatim from src/index.css) ---- */
      .current.light {
        --background: oklch(0.98 0.002 250); --foreground: oklch(0.15 0.02 260);
        --card: oklch(1 0 0); --muted: oklch(0.94 0.01 260);
        --muted-foreground: oklch(0.55 0.02 260); --primary: oklch(0.55 0.18 265);
        --primary-foreground: oklch(0.98 0.005 265); --border: oklch(0.88 0.01 260);
        --sidebar: oklch(0.985 0 0); --accent-dot: oklch(0.55 0.18 265);
        --chart-1: oklch(0.55 0.18 265); --chart-2: oklch(0.6 0.17 145);
        --chart-3: oklch(0.7 0.15 70); --chart-4: oklch(0.55 0.16 330); --chart-5: oklch(0.58 0.2 25);
        --shadow: 0 1px 2px rgb(0 0 0 / 6%), 0 8px 24px rgb(0 0 0 / 6%);
      }
      .current.dark {
        --background: oklch(0.26 0.004 265); --foreground: oklch(0.87 0.005 265);
        --card: oklch(0.29 0.005 265); --muted: oklch(0.31 0.005 265);
        --muted-foreground: oklch(0.58 0.008 265); --primary: oklch(0.62 0.12 265);
        --primary-foreground: oklch(0.96 0.005 265); --border: oklch(0.34 0.006 265);
        --sidebar: oklch(0.23 0.005 265); --accent-dot: oklch(0.62 0.12 265);
        --chart-1: oklch(0.62 0.12 265); --chart-2: oklch(0.62 0.14 145);
        --chart-3: oklch(0.68 0.12 70); --chart-4: oklch(0.58 0.1 330); --chart-5: oklch(0.62 0.16 25);
        --shadow: 0 1px 2px rgb(0 0 0 / 30%), 0 8px 24px rgb(0 0 0 / 35%);
      }

      /* ---- RETUNED tokens (ElevenLabs-inspired proposal) ---- */
      .retuned.light {
        --background: oklch(0.985 0.0015 265); --foreground: oklch(0.18 0.012 265);
        --card: oklch(1 0 0); --muted: oklch(0.955 0.004 265);
        --muted-foreground: oklch(0.52 0.01 265);
        /* primary = near-black action, EL-style; accent reserved for meaning */
        --primary: oklch(0.26 0.02 265); --primary-foreground: oklch(0.99 0 0);
        --border: oklch(0.915 0.003 265); --sidebar: oklch(0.975 0.002 265);
        --accent-dot: oklch(0.55 0.17 265);
        /* charts: mono-leaning, one accent + intensity steps */
        --chart-1: oklch(0.30 0.02 265); --chart-2: oklch(0.55 0.17 265);
        --chart-3: oklch(0.62 0.02 265); --chart-4: oklch(0.78 0.015 265); --chart-5: oklch(0.45 0.02 265);
        --shadow: 0 1px 2px rgb(0 0 0 / 4%), 0 6px 20px rgb(0 0 0 / 4%);
      }
      .retuned.dark {
        /* near-black surfaces, tight elevation steps */
        --background: oklch(0.165 0.004 265); --foreground: oklch(0.93 0.004 265);
        --card: oklch(0.198 0.005 265); --muted: oklch(0.23 0.005 265);
        --muted-foreground: oklch(0.62 0.008 265);
        /* dark primary = white action button, EL signature */
        --primary: oklch(0.94 0.004 265); --primary-foreground: oklch(0.17 0.008 265);
        --border: oklch(0.26 0.005 265); --sidebar: oklch(0.135 0.004 265);
        --accent-dot: oklch(0.7 0.15 265);
        --chart-1: oklch(0.88 0.01 265); --chart-2: oklch(0.7 0.15 265);
        --chart-3: oklch(0.5 0.01 265); --chart-4: oklch(0.35 0.008 265); --chart-5: oklch(0.62 0.01 265);
        --shadow: 0 1px 2px rgb(0 0 0 / 40%), 0 10px 30px rgb(0 0 0 / 45%);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 28px; background: #6b6b70;
        font-family: "Apfel Grotezk", system-ui, sans-serif;
        font-size: 14px; -webkit-font-smoothing: antialiased; color: #fff;
      }
      .page-head { max-width: 1320px; margin: 0 auto 22px; }
      .page-head h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.013em; }
      .page-head p { margin: 0; opacity: 0.7; font-size: 13px; }
      .grid {
        max-width: 1320px; margin: 0 auto;
        display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
      }
      .col-label {
        font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;
        opacity: 0.8; margin: 0 0 10px 2px;
      }
      .col-label.good::before { content: "→ "; }

      /* themed app frame */
      .frame {
        background: var(--background); color: var(--foreground);
        border-radius: 16px; overflow: hidden; margin-bottom: 22px;
        display: grid; grid-template-columns: 184px 1fr; min-height: 420px;
        box-shadow: 0 20px 60px rgb(0 0 0 / 30%);
      }
      .frame * { font-family: inherit; }

      /* sidebar */
      .sb { background: var(--sidebar); border-right: 1px solid var(--border); padding: 14px 12px; }
      .sb-brand { display: flex; align-items: center; gap: 8px; padding: 4px 8px 14px; }
      .sb-logo { width: 22px; height: 22px; border-radius: 7px; background: var(--primary); }
      .sb-brand b { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
      .sb-proj {
        display: flex; align-items: center; gap: 8px; padding: 7px 9px; margin-bottom: 12px;
        border-radius: 9px; background: var(--muted); font-size: 12.5px;
      }
      .sb-proj .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-dot); }
      .sb-sec { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.09em;
        color: var(--muted-foreground); padding: 10px 9px 4px; }
      .nav { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 9px;
        color: var(--muted-foreground); font-size: 13px; }
      .nav .ic { width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid currentColor; opacity: 0.8; }
      .nav.on { background: var(--muted); color: var(--foreground); font-weight: 500; }

      /* main */
      .main { padding: 18px 20px; min-width: 0; }
      .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
      .topbar h2 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.013em; }
      .top-actions { display: flex; align-items: center; gap: 8px; }
      .pill { font-size: 12px; padding: 6px 11px; border: 1px solid var(--border); border-radius: 8px;
        color: var(--muted-foreground); }
      .btn { font-size: 12.5px; font-weight: 500; padding: 7px 13px; border-radius: 8px;
        background: var(--primary); color: var(--primary-foreground); border: 0; cursor: default; }

      .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
      .tile { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
        padding: 13px 14px; box-shadow: var(--shadow); }
      .tile .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
        color: var(--muted-foreground); display: flex; align-items: center; gap: 6px; }
      .tile .lbl .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-dot); }
      .tile .val { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin: 7px 0 2px; }
      .tile .sub { font-size: 11.5px; color: var(--muted-foreground); }
      .tile .up { color: oklch(0.62 0.16 145); }

      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
        padding: 14px; box-shadow: var(--shadow); }
      .panel .ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
      .panel .ph b { font-size: 13px; font-weight: 500; }
      .panel .ph span { font-size: 11px; color: var(--muted-foreground); }
      .legend { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--muted-foreground); }
      .legend i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 5px; }
    </style>
  </head>
  <body>
    <div class="page-head">
      <h1>Pug · design retune preview</h1>
      <p>Same markup, two token sets. Left = current tokens (verbatim from <code>src/index.css</code>). Right = ElevenLabs-inspired retune. Nothing in the app has changed — this is a sandbox.</p>
    </div>

    <div class="grid">
      <div><div class="col-label">Current — light</div><div id="cl"></div></div>
      <div><div class="col-label good">Retuned — light</div><div id="rl"></div></div>
      <div><div class="col-label">Current — dark</div><div id="cd"></div></div>
      <div><div class="col-label good">Retuned — dark</div><div id="rd"></div></div>
    </div>

    <script>
      const chart = (mode) => {
        // simple area + line built from a fixed series
        const pts = [38, 30, 44, 36, 52, 46, 64, 58, 72, 66, 84];
        const W = 100, H = 36, max = 90;
        const xy = pts.map((p, i) => [ (i / (pts.length - 1)) * W, H - (p / max) * H ]);
        const line = xy.map(([x, y], i) => (i ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1)).join(" ");
        const area = "M0 " + H + " " + line.replace("M", "L") + " L" + W + " " + H + " Z";
        return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:120px;display:block">
          <defs><linearGradient id="g-${mode}" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="var(--chart-2)" stop-opacity="0.28"/>
            <stop offset="1" stop-color="var(--chart-2)" stop-opacity="0"/>
          </linearGradient></defs>
          <path d="${area}" fill="url(#g-${mode})"/>
          <path d="${line}" fill="none" stroke="var(--chart-2)" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
          <path d="${line.replace(/[\d.]+ [\d.]+/g, (m,i)=>{const[a,b]=m.split(' ');return a+' '+(parseFloat(b)+6)})}" fill="none" stroke="var(--chart-1)" stroke-width="1.4" stroke-opacity="0.85" vector-effect="non-scaling-stroke"/>
        </svg>`;
      };

      const frame = (mode) => `
        <div class="frame ${mode}">
          <aside class="sb">
            <div class="sb-brand"><div class="sb-logo"></div><b>Pug</b></div>
            <div class="sb-proj"><span class="dot"></span>Acme Production</div>
            <div class="sb-sec">Analyze</div>
            <div class="nav on"><span class="ic"></span>Overview</div>
            <div class="nav"><span class="ic"></span>Insights</div>
            <div class="nav"><span class="ic"></span>Profiles</div>
            <div class="sb-sec">Engage</div>
            <div class="nav"><span class="ic"></span>Campaigns</div>
            <div class="nav"><span class="ic"></span>Live</div>
          </aside>
          <main class="main">
            <div class="topbar">
              <h2>Overview</h2>
              <div class="top-actions">
                <span class="pill">Last 7 days</span>
                <button class="btn">New campaign</button>
              </div>
            </div>
            <div class="tiles">
              <div class="tile"><div class="lbl"><span class="dot"></span>Active users</div>
                <div class="val">12,847</div><div class="sub"><span class="up">▲ 4.2%</span> vs last week</div></div>
              <div class="tile"><div class="lbl">Events today</div>
                <div class="val">1.24M</div><div class="sub">across 38 kinds</div></div>
              <div class="tile"><div class="lbl">Avg session</div>
                <div class="val">3m 42s</div><div class="sub">+12s vs last week</div></div>
            </div>
            <div class="panel">
              <div class="ph"><b>Events over time</b><span>hourly</span></div>
              ${chart(mode.replace(" ", "-"))}
              <div class="legend"><span><i style="background:var(--chart-1)"></i>app_open</span><span><i style="background:var(--chart-2)"></i>purchase</span></div>
            </div>
          </main>
        </div>`;

      document.getElementById("cl").innerHTML = frame("current light");
      document.getElementById("rl").innerHTML = frame("retuned light");
      document.getElementById("cd").innerHTML = frame("current dark");
      document.getElementById("rd").innerHTML = frame("retuned dark");
    </script>
  </body>
</html>
