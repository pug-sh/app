<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preconnect external origins so off-site links navigate faster on click -->
    <link rel="preconnect" href="https://tshoka.com" />
    <link rel="preconnect" href="https://pug.sh" />
    <link rel="preconnect" href="https://docs.pug.sh" />
    <title>Pug</title>
    <script>
      // Apply dark mode before first paint to prevent flash.
      // Must match atomWithStorage key ("pug:theme") and JSON format.
      try {
        const t = JSON.parse(localStorage.getItem('pug:theme') || '"system"')
        const dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
